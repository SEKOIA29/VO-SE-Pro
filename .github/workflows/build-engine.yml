name: "🎙️ VO-SE Pro: Official Engine Builder (Integrated)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "🛠️ Build & Pack on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: "📂 [Step 1] Checkout Repository"
        uses: actions/checkout@v6

      - name: "🐍 [Step 2] Setup Python Environment"
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: "📦 [Step 3] Install Dependencies"
        run: |
          pip install numpy PySide6 sounddevice soundfile mido janome Pillow pyinstaller
          pip install pyopenjtalk --only-binary :all: || pip install pyopenjtalk

      - name: "📂 [Step 4] Prepare Directory"
        shell: bash
        run: mkdir -p bin src assets dist_out

      - name: "🎙️ [Step 5] Pack Official Voice Data"
        run: python modules/tools/pack_all_voices.py

      - name: "🔍 Verify bin contents"
        shell: bash
        run: |
          echo "=== bin/ の中身 ==="
          ls -la bin/ 2>/dev/null || echo "bin/ が存在しません"
      - name: "🔧 Setup MSVC (Windows only)"
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "🏗️ [Step 6] Compile Engine"
        shell: bash
        run: |
          # ヘッダーファイルをソースと同じ場所に集約（インクルード解決を確実に）
          cp include/world/*.h src/world/
          cp include/*.h src/

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows (MSVC): vose_core と WORLD ソースをまとめて DLL にビルド
            # /I でインクルードパスを多重に指定し、依存関係を解決
            cmd //c "cl.exe /std:c++17 /EHsc /O2 /LD /D_USE_MATH_DEFINES \
              /Fe:bin\\vose_core.dll \
              src\\vose_core.cpp \
              src\\world\\cheaptrick.cpp \
              src\\world\\common.cpp \
              src\\world\\d4c.cpp \
              src\\world\\dio.cpp \
              src\\world\\fft.cpp \
              src\\world\\harvest.cpp \
              src\\world\\matlabfunctions.cpp \
              src\\world\\stonemask.cpp \
              src\\world\\synthesis.cpp \
              src\\world\\audioio.cpp \
              /I src /I include /I src\\world \
              /link"

          else
            # macOS (Clang): 個別にコンパイルして dynamiclib としてリンク[cite: 30]
            cd src/world
            for f in *.cpp; do
              [ -e "$f" ] || continue
              clang++ -O3 -c -std=c++17 -stdlib=libc++ -mmacosx-version-min=11.0 \
                -I. -I.. -I../../include "$f"
            done
            cd ../..

            clang++ -O3 -dynamiclib -std=c++17 -stdlib=libc++ \
              -mmacosx-version-min=11.0 \
              -I./src -I./include -I./src/world \
              -o bin/vose_core.dylib \
              src/vose_core.cpp \
              src/world/*.o
          fi
          
      - name: "🔍 Verify DLL/dylib"
        shell: bash
        run: ls -la bin/
      - name: "📦 [Step 7] Package Integrated Executable (PyInstaller)"
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # EXEにすべてを統合
            pyinstaller --noconsole --onefile \
              --add-data "bin/vose_core.dll;bin" \
              --add-data "assets;assets" \
              --distpath ./dist_out --name "VO-SE_PRO_Win" main.py
          else
            # Macアプリ化してZIPに固める
            pyinstaller --noconsole --windowed \
              --add-data "bin/vose_core.dylib:bin" \
              --add-data "assets:assets" \
              --distpath ./dist_out --name "VO-SE_PRO_Mac" main.py
            cd dist_out && zip -r VO-SE_PRO_Mac.zip VO-SE_PRO_Mac.app && cd ..
          fi

      - name: "🔍 Debug: List files before release"
        shell: bash
        run: |
          echo "--- dist_out content ---"
          find dist_out -maxdepth 2
          echo "--- bin content ---"
          ls -R bin/

      - name: "🚀 [Step 8] Publish GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "VO-SE PRO (Official Edition)"
          # ↓ パイプ記号 '|' を使い、インデントを揃えることで「リスト」として認識させます
          files: |
            dist_out/VO-SE_PRO_Win.exe
            dist_out/VO-SE_PRO_Mac.zip
            dist_out/**/VO-SE_PRO_Win.exe
            bin/*.dll
            bin/*.dylib
          fail_on_unmatched_files: false # 最初はfalseにして、何が成功するか見るのが安全です
          generate_release_notes: true
          make_latest: true
          append_body: true
          # overwriteを有効にするならこちらも
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
