name: "🚀 Release VO-SE  Pro (Official Edition)"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip uninstall -y pkg_resources || true
          python -m pip install "setuptools>=70,<81" "pyinstaller==6.13.0"
          pip install PySide6 numpy sounddevice soundfile mido janome Pillow ruff pyright scipy onnxruntime chardet pykakasi backports.tarfile packaging
          pip install pyopenjtalk --only-binary :all: || pip install pyopenjtalk


       
      - name: Ruff Check and Fix (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        # ルールコードをすべて大文字 (E, F, E501, E401) に修正
        run: ruff check . --select E,F --ignore E501,E401 --fix --exit-zero

      - name: 🔍 Debug: Find pack script
        run: |
        echo "=== リポジトリ構造 ==="
        find . -name "*.py" | grep -i "pack\|voice" | sort
       echo ""
       echo "=== modules/tools の中身 ==="
       ls -la modules/tools/ 2>/dev/null || echo "modules/tools が存在しません"
       echo ""
       echo "=== modules の中身 ==="
       ls -la modules/ 2>/dev/null || echo "modules が存在しません"

      - name: 🎙️ Generate Voice Data Header
        run: |
          # pack_voice.py を実行して src/voice_data.h を生成
          python modules/tools/pack_all_voices.py

      - name: Auto Commit Fixes
        if: matrix.os == 'windows-latest'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix unused imports"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: 🛠️ Build VOSE Core (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # MSVC(cl.exe)を使用してビルド
          mkdir bin -Force
          cl.exe /O2 /LD /Fe:bin/vose_core.dll src/vose_core.cpp /I include /link /LIBPATH:lib world.lib

      - name: 🛠️ Build VOSE Core (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # 1. 出力先ディレクトリの作成
          mkdir -p bin
          
          # 2. WORLDのビルド (src/world に移動して実行)
          # ここで -I. と -I.. を指定することで、あらゆるインクルード形式に対応させます
          cd src/world
          
          echo "🔨 Compiling WORLD source files..."
          
          # CPPファイルのコンパイル (存在する場合のみ)
          for f in *.cpp; do
            [ -e "$f" ] || continue
            echo "  Compiling $f..."
            clang++ -O3 -c -std=c++17 -stdlib=libc++ -mmacosx-version-min=11.0 -I. -I.. "$f"
          done
          
          # Cファイルのコンパイル (存在する場合のみ)
          for f in *.c; do
            [ -e "$f" ] || continue
            echo "  Compiling $f..."
            clang -O3 -c -mmacosx-version-min=11.0 -I. -I.. "$f"
          done
          
          cd ../..

          # 3. メインの vose_core と全オブジェクトファイルを結合
          # WORLDの全オブジェクトファイルを強制的にリンク対象に含めます
          echo "🔗 Linking all objects into libvose_core.dylib..."
          
          clang++ -O3 -dynamiclib -std=c++17 -stdlib=libc++ \
            -mmacosx-version-min=11.0 \
            -I./src \
            -I./include \
            -I./src/world \
            -o bin/libvose_core.dylib \
            src/vose_core.cpp \
            src/world/*.o

          echo "✅ Build Complete: bin/libvose_core.dylib"
          ls -l bin/libvose_core.dylib



      - name: Verify pkg_resources for PyInstaller hook
        shell: python
        run: |
          import pkg_resources
          print("pkg_resources file:", getattr(pkg_resources, "__file__", "unknown"))
          print("has NullProvider:", hasattr(pkg_resources, "NullProvider"))
          if not hasattr(pkg_resources, "NullProvider"):
              raise SystemExit("pkg_resources.NullProvider is missing")

      - name: Create User Dictionary (if needed)
        shell: python
        run: |
          import os
          try:
              import pyopenjtalk
              if hasattr(pyopenjtalk, 'create_user_dict') and os.path.exists('user.csv'):
                  pyopenjtalk.create_user_dict('user.dic', 'user.csv')
                  print('User dictionary created successfully.')
              else:
                  print('Skip dict creation: No user.csv or function missing')
          except Exception as e:
              print(f'Skip dict creation: {e}')

      # ── ① バージョンをソースに埋め込む ──────────────────────────
      - name: Inject version into update_checker.py
        shell: bash
        run: |
          # タグ (v1.2.0) があればそれを使い、なければ 0.0.0-dev にする
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"   # "v1.2.0" → "1.2.0"
          else
            VERSION="0.0.0-dev"
          fi
          echo "Injecting version: $VERSION"

          # update_checker.py の CURRENT_VERSION を書き換える
          # ファイルがまだなければ作成する
          CHECKER="modules/updater/update_checker.py"
          mkdir -p modules/updater
          if [ -f "$CHECKER" ]; then
            sed -i.bak "s/^CURRENT_VERSION = .*/CURRENT_VERSION = \"$VERSION\"/" "$CHECKER"
          else
            # ファイルがない場合は最小構成で生成
            cat > "$CHECKER" << EOF
          import json, threading, urllib.request
          from packaging.version import Version

          CURRENT_VERSION = "$VERSION"
          GITHUB_API_URL = "https://api.github.com/repos/YOUR_ORG/VO-SE-Pro/releases/latest"

          class UpdateChecker:
              def check_async(self, callback):
                  threading.Thread(target=self._check, args=(callback,), daemon=True).start()

              def _check(self, callback):
                  try:
                      req = urllib.request.Request(GITHUB_API_URL, headers={"User-Agent": "VO-SE-Pro"})
                      with urllib.request.urlopen(req, timeout=5) as res:
                          data = json.loads(res.read())
                      latest = data["tag_name"].lstrip("v")
                      page_url = data["html_url"]
                      assets = data.get("assets", [])
                      # Windows は .exe、Mac はアップデート用 _update.zip を拾う
                      exe_url = next(
                          (a["browser_download_url"] for a in assets
                           if a["name"].endswith("_update.zip") or a["name"].endswith(".exe")),
                          None
                      )
                      if Version(latest) > Version(CURRENT_VERSION):
                          callback(True, latest, page_url, exe_url)
                      else:
                          callback(False, latest, None, None)
                  except Exception:
                      callback(None, None, None, None)
          EOF
          fi
          echo "Done. CURRENT_VERSION is now $VERSION"

      - name: Lint with Ruff
        run: |
          # 修正箇所: --ignore e501,e401 -> E501,E401
          ruff check . --select E,F --ignore E501,E401 --fix --exit-zero

      - name: Type Check with Pyright
        run: |
          pyright .

      - name: Pack Official Voice Data
        shell: bash
        run: |
          TARGET_SCRIPT=$(find . -name "pack_voice.py" -o -name "pack_all_voices.py" | head -n 1)
          if [ -n "$TARGET_SCRIPT" ]; then
            echo "Found script: $TARGET_SCRIPT"
            SCRIPT_DIR=$(dirname "$TARGET_SCRIPT")
            cd "$SCRIPT_DIR"
            python $(basename "$TARGET_SCRIPT")
            cd -
          else
            echo "Error: Packing script not found."
            exit 1
          fi

      - name: Build C++ Engine
        shell: bash
        run: |
          mkdir -p bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            g++ -std=c++17 -shared -fPIC -o bin/libvo_se.dll src/vose_core.cpp src/world/*.cpp \
              -I. -Isrc -Iinclude -Iinclude/world -O2 -static-libgcc -static-libstdc++
          else
            clang++ -std=c++17 -shared -fPIC -o bin/libvo_se.dylib src/vose_core.cpp src/world/*.cpp \
              -I. -Isrc -Iinclude -Iinclude/world -undefined dynamic_lookup -O3 -w
          fi

      - name: Package App
        shell: bash
        run: |
          rm -rf dist build dist_out
          mkdir dist_out

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller --noconsole --onefile --clean \
              --paths . \
              --paths modules \
              --icon="assets/icon.ico" \
              --hidden-import=modules.gui.main_window \
              --hidden-import=backports \
              --hidden-import=backports.tarfile \
              --add-data "bin/libvo_se.dll;bin" \
              --add-data "assets;assets" \
              --add-data "modules;modules" \
              --name "VO-SE_PRO_Win" main.py

            cp dist/VO-SE_PRO_Win.exe dist_out/

          else
            pyinstaller --noconsole --windowed --clean \
              --paths . \
              --paths modules \
              --icon="assets/icon.icns" \
              --exclude-module PySide6.QtPdf \
              --hidden-import=modules.gui.main_window \
              --hidden-import=backports \
              --hidden-import=backports.tarfile \
              --add-data "bin/libvo_se.dylib:bin" \
              --add-data "assets:assets" \
              --add-data "modules:modules" \
              --name "VO-SE_PRO_Mac" main.py

            chmod +x dist/VO-SE_PRO_Mac.app/Contents/MacOS/VO-SE_PRO_Mac

            # ── ② 配布用DMG（初回DL向け）──
            hdiutil create -volname "VO-SE Pro" \
              -srcfolder dist/VO-SE_PRO_Mac.app \
              -ov -format UDZO \
              dist_out/VO-SE_PRO_Mac.dmg

            # ── ② 自動アップデート用ZIP（_update サフィックスで区別）──
            cd dist && zip -ry ../dist_out/VO-SE_PRO_Mac_update.zip VO-SE_PRO_Mac.app && cd ..
          fi

      - name: 🍏 Create DMG
        if: matrix.os == 'macos-latest'
        run: |
          # create-dmg というツールを使って見栄えの良いDMGを作成
          brew install create-dmg
          create-dmg \
            --volname "VO-SE Pro Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VO-SE.app" 175 120 \
            --hide-extension "VO-SE.app" \
            --app-drop-link 425 120 \
            "dist_out/VO-SE-Pro-macOS.dmg" \
            "dist/VO-SE.app"

      - name: 🍎 Verify and Fix macOS Library Linkage (Complete & Final)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set +e
          APP_BIN=$(find dist -name "VO-SE_PRO_Mac" -type f | grep "\.app/Contents/MacOS/VO-SE_PRO_Mac" | head -n 1)
          chmod +x "$APP_BIN"
          find dist -name "libvo_se.dylib" -type f | while read -r DYLIB_BIN; do
            chmod 755 "$DYLIB_BIN"
            LIB_NAME=$(basename "$DYLIB_BIN")
            install_name_tool -id "$LIB_NAME" "$DYLIB_BIN" 2>&1 || true
            OLD_REF=$(otool -L "$APP_BIN" | grep "libvo_se" | awk '{print $1}')
            if [ -n "$OLD_REF" ]; then
              install_name_tool -change "$OLD_REF" "@executable_path/../Frameworks/bin/$LIB_NAME" "$APP_BIN" 2>&1 || true
              install_name_tool -change "$OLD_REF" "@loader_path/bin/$LIB_NAME" "$APP_BIN" 2>&1 || true
            fi
            codesign --force --deep --sign - "$DYLIB_BIN" 2>&1 || true
          done
          codesign --force --deep --sign - "dist/VO-SE_PRO_Mac.app" 2>&1 || true
          set -e

      - name: 🔍 Startup Smoke Test (GUI Headless)
        shell: bash
        run: |
          export QT_QPA_PLATFORM=offscreen
          export PYTHONIOENCODING=utf-8
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            printf "%s\n" \
              "import os, ctypes, sys" \
              "root_dir = os.path.abspath(os.getcwd())" \
              "bin_dir = os.path.join(root_dir, 'bin')" \
              "src_dir = os.path.join(root_dir, 'src')" \
              "dll_path = os.path.join(bin_dir, 'libvo_se.dll')" \
              "os.environ['PATH'] = bin_dir + os.pathsep + os.environ.get('PATH', '')" \
              "if hasattr(os, 'add_dll_directory'): os.add_dll_directory(bin_dir)" \
              "try:" \
              "    lib = ctypes.CDLL(dll_path, winmode=0)" \
              "    print('SUCCESS: DLL Loaded')" \
              "except Exception as e:" \
              "    print(f'DLL Error: {e}'); sys.exit(1)" \
              "sys.path.extend([root_dir, src_dir])" \
              "try:" \
              "    import main" \
              "    print('SUCCESS: App Import Passed')" \
              "except Exception as e:" \
              "    print(f'Import Error: {e}'); sys.exit(1)" > smoke_test.py
          else
            printf "%s\n" \
              "import os, ctypes, sys" \
              "root_dir = os.path.abspath(os.getcwd())" \
              "src_dir = os.path.join(root_dir, 'src')" \
              "dylib_path = os.path.join(root_dir, 'bin', 'libvo_se.dylib')" \
              "try:" \
              "    lib = ctypes.CDLL(dylib_path)" \
              "    print('SUCCESS: Dylib Loaded')" \
              "except Exception as e:" \
              "    print(f'Error: {e}'); sys.exit(1)" \
              "sys.path.extend([root_dir, src_dir])" \
              "try:" \
              "    import main" \
              "    print('SUCCESS: macOS Import Passed')" \
              "except Exception as e:" \
              "    print(f'Import Error: {e}'); sys.exit(1)" > smoke_test.py
          fi
          python smoke_test.py

      - name: 📦 Save Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VO-SE-PRO-Package-${{ matrix.os }}
          path: dist_out/

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: VO-SE-PRO-Package-*
          merge-multiple: true
          path: dist_out

      - name: Show release files
        run: ls -la dist_out

      # ── ③ タグが v* の時だけ正式リリース、それ以外は pre-release ──
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest-dev' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('VO-SE Pro {0}', github.ref_name) || 'VO-SE Pro (Dev Build)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          fail_on_unmatched_files: false
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: |
            dist_out/VO-SE_PRO_Win.exe
            dist_out/VO-SE_PRO_Mac.dmg
            dist_out/VO-SE_PRO_Mac_update.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
